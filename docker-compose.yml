services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    container_name: financial-risk-frontend
    restart: unless-stopped
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: financial-risk-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://risk_admin:change_me_locally@postgres:5432/financial_risk
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: financial-risk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financial_risk}
      POSTGRES_USER: ${POSTGRES_USER:-risk_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_locally}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-risk_admin} -d ${POSTGRES_DB:-financial_risk}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
